services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: playto_pay
      POSTGRES_USER: playto
      POSTGRES_PASSWORD: playto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    image: python:3.14-slim
    working_dir: /app
    command: >
      sh -c "pip install -r requirements.txt &&
      python backend/manage.py migrate &&
      python backend/manage.py seed_demo_data &&
      python backend/manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://playto:playto@db:5432/playto_pay
      REDIS_URL: redis://redis:6379/0
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    depends_on:
      - db
      - redis

  worker:
    image: python:3.14-slim
    working_dir: /app
    command: >
      sh -c "pip install -r requirements.txt &&
      celery -A config worker --workdir backend --loglevel=info"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://playto:playto@db:5432/playto_pay
      REDIS_URL: redis://redis:6379/0
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
    depends_on:
      - db
      - redis

  beat:
    image: python:3.14-slim
    working_dir: /app
    command: >
      sh -c "pip install -r requirements.txt &&
      celery -A config beat --workdir backend --loglevel=info"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://playto:playto@db:5432/playto_pay
      REDIS_URL: redis://redis:6379/0
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
